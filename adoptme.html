<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>adopt me</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <nav style="font-size: 2rem; padding: 1rem; background-color: white;">
        <span>links -> </span>
        <a href="./index.html" target="_blank">this page</a>
        <a href="./adoptme.html">adopt one!</a>
    </nav>

    <form id="retard-form" action="" class="box" style="max-width: 500px;">
        <section style="display: flex; flex-direction: column;">
            <h2>1. ข้อมูลส่วนตัวของผู้สนใจรับอุปการะสุนัข</h2>
            <label for="full-name">
                <span>ชื่อ – นามสกุล</span>
                <input type="text" name="full-name" id="full-name" required>
            </label>
            <label for="phone">
                <span>เบอร์ติดต่อ</span>
                <input type="tel" name="phone" id="phone" required>
            </label>
            <label for="email">
                <span>email</span>
                <input type="email" name="email" id="email">
            </label>
        </section>
    
        <section style="display: flex; flex-direction: column;">
            <h2>2. สิ่งแวดล้อมในการเลี้ยงดู</h2>
            <label for="address">
                <span>ที่อยู่</span>
                <textarea name="address" id="address" required></textarea>
            </label>
            <label for="housing">
                <span>ลักษณะที่พักอาศัย</span>
                <select name="housing" id="housing" required>
                    <option value="garden">บ้านสวน</option>
                    <option value="single">บ้านเดี่ยว</option>
                    <option value="townhome">บ้านทาวน์โฮม</option>
                    <option value="condo">คอนโดมิเนียม/หอพัก</option>
                </select>
            </label>
            <fieldset>
                <label>
                    <input type="radio" name="indoor-outdoor" value="indoor" required>
                    เลี้ยงสุนัขภายในบ้าน
                </label>
                <label>
                    <input type="radio" name="indoor-outdoor" value="outdoor">
                    เลี้ยงสุนัขภายนอกบ้าน
                </label>
            </fieldset>
            <label for="pet-count">
                <span>จำนวนสัตว์เลี้ยง</span>
                <input type="number" name="pet-count" id="pet-count" min="0" max="100">
            </label>
            <label>
                <input type="checkbox" name="disclaimer" id="disclaimer" required>
                การส่งแบบฟอร์มนี้เป็นการแจ้งความสนใจ โดยไม่รับรองการได้รับอุปการะสุนัข
            </label>
        </section>
        <button type="submit">Submit Form</button>
    </form>

    <div id="student-id" class="box" style="bottom: 0; left: 50%; transform: translateX(-50%);">
        <p>6833271121 Sutarasil Srisahakarnkij</p>
        <p>6833271121 สุธรศิลป์ ศรีสหการกิจ</p>
    </div>

    <script defer src="./js/adoptme.js"></script>
    <script defer src="./js/utils.js"></script>
</body>
</html>
